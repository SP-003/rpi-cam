<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Zero W - Advanced Cam Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        
        /* Tab Navigation */
        .tab { overflow: hidden; background-color: #2d2d2d; border-bottom: 1px solid #444; }
        .tab button { background-color: inherit; float: left; border: none; outline: none; cursor: pointer; padding: 14px 24px; transition: 0.3s; color: #fff; font-size: 16px; }
        .tab button:hover { background-color: #3d3d3d; }
        .tab button.active { background-color: #4CAF50; color: white; }
        
        /* Tab Content */
        .tabcontent { display: none; padding: 20px; border-top: none; }
        .active-content { display: block; }
        
        /* Video Feed */
        .feed-container { text-align: center; }
        img { max-width: 100%; border: 2px solid #444; border-radius: 4px; }
        
        /* Form Controls */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, input[type="range"] { width: 100%; max-width: 300px; padding: 8px; background-color: #333; color: #fff; border: 1px solid #555; border-radius: 4px; }
        .status { margin-top: 15px; color: #4CAF50; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'Feed')">Live Feed</button>
        <button class="tablinks" onclick="openTab(event, 'Controls')">Camera Settings</button>
    </div>

    <div id="Feed" class="tabcontent active-content">
        <div class="feed-container">
            <h3>IR Camera Feed</h3>
            <img src="{{ url_for('stream') }}" alt="Live Camera Stream" id="videoStream">
        </div>
    </div>

    <div id="Controls" class="tabcontent">
        <h3>Adjust Hardware Settings</h3>
        
        <div class="form-group">
            <label for="resolution">Aspect Ratio / Resolution</label>
            <select id="resolution" onchange="updateSettings()">
                <option value="320x240">320x240 (4:3 - Low Resource)</option>
                <option value="640x480" selected>640x480 (4:3 - Balanced)</option>
                <option value="1280x720">1280x720 (16:9 - High Resource)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fps">Target Frame Rate: <span id="fpsValue">15</span> FPS</label>
            <input type="range" id="fps" min="1" max="30" value="15" onchange="updateSettings()" oninput="document.getElementById('fpsValue').innerText = this.value">
        </div>

        <div id="statusMessage" class="status"></div>
    </div>
</div>

<script>
    // Tab switching logic
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active-content");
        }
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active-content");
        evt.currentTarget.className += " active";
    }

    // API push logic
    function updateSettings() {
        const resolution = document.getElementById('resolution').value;
        const fps = document.getElementById('fps').value;
        const statusDiv = document.getElementById('statusMessage');

        statusDiv.innerText = "Applying changes to camera hardware...";

        fetch('/api/settings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                resolution: resolution,
                fps: fps
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === "success") {
                statusDiv.innerText = "Settings successfully applied!";
                setTimeout(() => { statusDiv.innerText = ""; }, 3000);
            }
        })
        .catch((error) => {
            console.error('Error:', error);
            statusDiv.innerText = "Error applying settings. Check SSH logs.";
            statusDiv.style.color = "#ff5252";
        });
    }
</script>

</body>
</html>
